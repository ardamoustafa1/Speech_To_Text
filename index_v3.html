<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ASR V3 Streaming</title>
    <style>
        :root {
            --primary: #008069;
            --bg: #111b21;
            --msg-bg: #202c33;
            --text: #e9edef;
        }

        body {
            margin: 0;
            font-family: -apple-system, system-ui;
            background: var(--bg);
            color: var(--text);
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .header {
            background: #202c33;
            padding: 15px;
            font-weight: 500;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .status {
            font-size: 12px;
            padding: 4px 8px;
            border-radius: 10px;
            background: #005c4b;
        }

        #chat {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .msg {
            padding: 10px 15px;
            border-radius: 12px;
            background: var(--msg-bg);
            max-width: 80%;
            line-height: 1.4;
        }

        .msg.final {
            border-left: 4px solid var(--primary);
        }

        .msg.partial {
            opacity: 0.7;
            font-style: italic;
            border: 1px dashed #666;
        }

        .controls {
            padding: 20px;
            display: flex;
            justify-content: center;
            gap: 20px;
            background: #202c33;
        }

        .mic-btn {
            width: 64px;
            height: 64px;
            border-radius: 50%;
            border: none;
            background: var(--primary);
            color: white;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.3);
        }

        .mic-btn svg {
            width: 32px;
            height: 32px;
        }

        .mic-btn.listening {
            background: #ff3b30;
            transform: scale(1.1);
            animation: pulse 1s infinite;
        }

        @keyframes pulse {
            0% {
                box-shadow: 0 0 0 0 rgba(255, 59, 48, 0.4);
            }

            70% {
                box-shadow: 0 0 0 15px rgba(255, 59, 48, 0);
            }

            100% {
                box-shadow: 0 0 0 0 rgba(255, 59, 48, 0);
            }
        }
    </style>
</head>

<body>
    <div class="header">
        <span>Canlı Akış (V3.0)</span>
        <span class="status" id="status">Bağlanıyor...</span>
    </div>

    <div id="chat">
        <div class="msg">Konuşmaya başlayın, kelimeler otomatik dökülecek...</div>
    </div>

    <div class="controls">
        <button class="mic-btn" id="micBtn">
            <svg viewBox="0 0 24 24" fill="currentColor">
                <path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3z" />
                <path
                    d="M17 11c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z" />
            </svg>
        </button>
    </div>

    <!-- AudioWorklet Injector -->
    <script>
        const workletCode = `
            class PCMProcessor extends AudioWorkletProcessor {
                process(inputs, outputs, parameters) {
                    const input = inputs[0];
                    if (input.length > 0) {
                        const float32Data = input[0];
                        this.port.postMessage(float32Data);
                    }
                    return true;
                }
            }
            registerProcessor('pcm-processor', PCMProcessor);
        `;

        const blob = new Blob([workletCode], { type: 'application/javascript' });
        const workletUrl = URL.createObjectURL(blob);

        class Streamer {
            constructor() {
                this.ws = null;
                this.ctx = null;
                this.source = null;
                this.worklet = null;
                this.isStreaming = false;

                this.UI = {
                    status: document.getElementById('status'),
                    chat: document.getElementById('chat'),
                    btn: document.getElementById('micBtn')
                };

                this.connect();
            }

            connect() {
                this.ws = new WebSocket(`ws://${location.hostname}:9001/ws/stream`);
                this.ws.binaryType = 'arraybuffer';

                this.ws.onopen = () => this.setStatus("Hazır", "#005c4b");
                this.ws.onclose = () => { this.setStatus("Koptu", "#ff3b30"); setTimeout(() => this.connect(), 2000); };
                this.ws.onmessage = (e) => this.handleMessage(JSON.parse(e.data));
            }

            setStatus(text, color) {
                this.UI.status.textContent = text;
                this.UI.status.style.backgroundColor = color;
            }

            handleMessage(data) {
                if (data.status === 'listening') {
                    this.setStatus("DİNLEMEDE", "#00a884");
                } else if (data.status === 'processing') {
                    this.setStatus("İŞLENİYOR...", "#ffa500");
                } else if (data.text) {
                    this.addMessage(data.text);
                }
            }

            addMessage(text) {
                const div = document.createElement('div');
                div.className = 'msg final';
                div.textContent = text;
                this.UI.chat.appendChild(div);
                this.UI.chat.scrollTop = this.UI.chat.scrollHeight;
            }

            async toggle() {
                if (this.isStreaming) {
                    this.stop();
                } else {
                    await this.start();
                }
            }

            async start() {
                try {
                    this.ctx = new AudioContext({ sampleRate: 16000 });
                    await this.ctx.audioWorklet.addModule(workletUrl);

                    const stream = await navigator.mediaDevices.getUserMedia({
                        audio: {
                            echoCancellation: true,
                            noiseSuppression: true,
                            sampleRate: 16000
                        }
                    });

                    this.source = this.ctx.createMediaStreamSource(stream);
                    this.worklet = new AudioWorkletNode(this.ctx, 'pcm-processor');

                    this.worklet.port.onmessage = (e) => {
                        if (this.ws.readyState === 1) {
                            this.ws.send(e.data);
                        }
                    };

                    this.source.connect(this.worklet);
                    this.worklet.connect(this.ctx.destination); // Keep alive

                    this.isStreaming = true;
                    this.UI.btn.classList.add('listening');
                } catch (e) {
                    alert("Mikrofon hatası: " + e.message);
                }
            }

            stop() {
                if (this.ctx) this.ctx.close();
                if (this.source) this.source.disconnect();
                this.isStreaming = false;
                this.UI.btn.classList.remove('listening');
                this.setStatus("Hazır", "#005c4b");
            }
        }

        const app = new Streamer();
        document.getElementById('micBtn').addEventListener('click', () => app.toggle());
    </script>
</body>

</html>

<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Müşteri Hizmetleri (iPhone Modu)</title>
    <style>
        /* iOS WhatsApp Dark Theme Colors */
        :root {
            --bg-color: #000000;
            --chat-bg: #0b141a;
            --header-bg: #1f2c34;
            --msg-out: #005c4b;
            --msg-in: #202c33;
            --text-primary: #e9edef;
            --text-secondary: #8596a0;
            --accent: #25D366;
            /* WhatsApp Green */
            --input-bg: #1f2c34;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background: #111;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            color: var(--text-primary);
        }

        /* Mobile Frame Simulator */
        .mobile-frame {
            width: 375px;
            height: 812px;
            background: var(--chat-bg);
            border-radius: 40px;
            box-shadow: 0 0 50px rgba(0, 0, 0, 0.5);
            border: 8px solid #333;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
        }

        /* Notch */
        .mobile-frame::before {
            content: '';
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 150px;
            height: 25px;
            background: #333;
            border-bottom-left-radius: 15px;
            border-bottom-right-radius: 15px;
            z-index: 10;
        }

        .chat-header {
            background: var(--header-bg);
            padding: 40px 15px 15px 15px;
            /* Top padding for notch */
            display: flex;
            align-items: center;
            gap: 15px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: linear-gradient(135deg, #007bff, #00c6ff);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            color: white;
        }

        .chat-body {
            flex: 1;
            padding: 20px;
            background-image: url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png');
            opacity: 0.95;
            display: flex;
            flex-direction: column;
            gap: 10px;
            overflow-y: auto;
        }

        .msg {
            padding: 8px 12px;
            border-radius: 16px;
            max-width: 75%;
            font-size: 16px;
            line-height: 1.4;
            position: relative;
        }

        .msg.bot {
            background: var(--msg-in);
            align-self: flex-start;
            border-top-left-radius: 0;
        }

        .msg.user {
            background: var(--msg-out);
            color: var(--text-primary);
            align-self: flex-end;
            border-top-right-radius: 0;
        }

        .time {
            font-size: 10px;
            color: var(--text-secondary);
            float: right;
            margin-top: 5px;
            margin-left: 10px;
        }

        .chat-footer {
            padding: 10px 15px 30px 15px;
            /* Bottom padding for home indicator */
            background: var(--header-bg);
            display: flex;
            gap: 10px;
            align-items: flex-end;
        }

        .input-wrapper {
            flex: 1;
            background: var(--input-bg);
            border-radius: 20px;
            padding: 10px 15px;
            min-height: 40px;
            max-height: 100px;
            overflow-y: auto;
            display: flex;
            align-items: center;
        }

        /* Fake Input Element */
        .ios-input {
            width: 100%;
            background: transparent;
            border: none;
            color: white;
            font-size: 16px;
            outline: none;
            resize: none;
            height: 24px;
            /* Init height */
        }

        .ios-input:empty::before {
            content: "Message";
            color: var(--text-secondary);
        }

        /* MICROPHONE BUTTON (WhatsApp Style) */
        #mic-btn {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            background: var(--accent);
            border: none;
            cursor: pointer;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.3);
            transition: transform 0.2s, background 0.3s;
        }

        #mic-btn:active {
            transform: scale(0.9);
        }

        #mic-btn.active {
            background: #FF3B30;
            /* iOS Red */
            animation: pulse 1.5s infinite;
        }

        /* SEND BUTTON */
        #send-btn {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            background: #007bff;
            /* Blue for Send */
            border: none;
            cursor: pointer;
            color: white;
            display: none;
            /* Hidden by default */
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.3);
            transition: transform 0.2s, background 0.3s;
        }

        #send-btn:active {
            transform: scale(0.9);
        }

        /* Ghost Text for Interim Results */
        .interim {
            color: rgba(255, 255, 255, 0.5);
        }

        @keyframes pulse {
            0% {
                transform: scale(1);
                box-shadow: 0 0 0 0 rgba(255, 59, 48, 0.4);
            }

            50% {
                transform: scale(1.1);
                box-shadow: 0 0 0 10px rgba(255, 59, 48, 0);
            }

            100% {
                transform: scale(1);
                box-shadow: 0 0 0 0 rgba(255, 59, 48, 0);
            }
        }
    </style>
</head>

<body>

    <div class="mobile-frame">
        <!-- iOS Status Bar Placeholder -->
        <div style="height: 20px;"></div>

        <div class="chat-header">
            <div class="avatar">CS</div>
            <div style="flex:1;">
                <div style="font-weight:600;">Müşteri Hizmetleri</div>
                <div style="font-size:12px; color: var(--text-secondary);">Çevrimiçi</div>
            </div>
        </div>

        <div class="chat-body" id="chat-body">
            <div class="msg bot">
                Merhaba! Size nasıl yardımcı olabilirim?
                <span class="time">14:02</span>
            </div>
        </div>

        <div class="chat-footer">
            <div style="color: var(--accent); font-size:24px; padding-bottom: 8px;">+</div>

            <div class="input-wrapper">
                <!-- Using ContentEditable DIV for better multiline handling like iOS -->
                <div class="ios-input" id="chat-input" contenteditable="true"></div>
            </div>

            <!-- SEND BUTTON (Paper Plane) -->
            <button id="send-btn">
                <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor">
                    <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"></path>
                </svg>
            </button>

            <!-- MIC BUTTON -->
            <button id="mic-btn">
                <svg viewBox="0 0 24 24" width="24" height="24" fill="currentColor">
                    <path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3z" />
                    <path
                        d="M17 11c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z" />
                </svg>
            </button>
        </div>
    </div>

    <!-- 1. INCLUDE THE SCRIPT -->
    <script src="native_asr.js"></script>

    <!-- 2. INITIALIZE -->
    <script>
        const inputDiv = document.getElementById('chat-input');
        const btn = document.getElementById('mic-btn');
        const sendBtn = document.getElementById('send-btn');
        const chatBody = document.getElementById('chat-body');

        // Scroll to bottom
        function scrollToBottom() {
            chatBody.scrollTop = chatBody.scrollHeight;
        }

        // Toggle Buttons logic
        function toggleButtons() {
            const text = inputDiv.innerText.trim();
            if (text.length > 0) {
                if (asr && asr.isListening) {
                    btn.style.display = 'flex';
                    sendBtn.style.display = 'none';
                } else {
                    btn.style.display = 'none';
                    sendBtn.style.display = 'flex';
                }
            } else {
                btn.style.display = 'flex';
                sendBtn.style.display = 'none';
            }
        }

        // Initialize our widget
        const asr = new NativeASR({
            inputElement: inputDiv,
            micButton: btn,
            onStatusChange: (status) => {
                if (status === 'listening') {
                    btn.style.display = 'flex';
                    sendBtn.style.display = 'none';
                } else {
                    toggleButtons();
                }
            },
            onError: (err) => {
                console.log("Mic error", err);
            }
        });

        asr.init();

        // Monitor typing
        inputDiv.addEventListener('input', toggleButtons);

        // Send Logic
        function sendMessage() {
            const text = inputDiv.innerText.trim();
            if (text) {
                // Add User Message
                const msgDiv = document.createElement('div');
                msgDiv.className = 'msg user';
                msgDiv.innerHTML = text + '<span class="time">' + new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }) + '</span>';
                chatBody.appendChild(msgDiv);

                inputDiv.innerText = '';
                asr.finalTranscript = ''; // Reset ASR buffer

                toggleButtons(); // Reset buttons
                scrollToBottom();

                // Fake Bot Reply
                setTimeout(() => {
                    const botDiv = document.createElement('div');
                    botDiv.className = 'msg bot';
                    botDiv.innerHTML = 'Mesajınız alındı. İşleminiz yapılıyor... <span class="time">' + new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }) + '</span>';
                    chatBody.appendChild(botDiv);
                    scrollToBottom();
                }, 1000);
            }
        }

        // Send Button Click
        sendBtn.addEventListener('click', sendMessage);

        // Send on Enter
        inputDiv.addEventListener('keypress', function (e) {
            if (e.key === 'Enter') {
                e.preventDefault();
                sendMessage();
            }
        });

    </script>
</body>

</html>
